worker_processes auto;

events {
    worker_connections 2048;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 10m;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        "" close;
    }

    # Use Docker's embedded DNS for dynamic re-resolution.
    # This prevents 502s caused by nginx caching stale upstream IPs at startup.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name _;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        location = /health/ {
            set $upstream_core core:8000;
            proxy_pass http://$upstream_core/health/;
        }

        location /api/chat/ {
            set $upstream_chat chat:8001;
            proxy_pass http://$upstream_chat/chat/;
        }

        location /api/ {
            set $upstream_core core:8000;
            proxy_pass http://$upstream_core;
        }

        location /admin/ {
            set $upstream_core core:8000;
            proxy_pass http://$upstream_core;
        }

        location /static/ {
            set $upstream_core core:8000;
            proxy_pass http://$upstream_core;
        }

        location /media/ {
            set $upstream_core core:8000;
            proxy_pass http://$upstream_core;
        }

        location /chat/ {
            set $upstream_chat chat:8001;
            proxy_pass http://$upstream_chat;
        }

        location /ws/ {
            set $upstream_chat chat:8001;
            proxy_pass http://$upstream_chat;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 1h;
            proxy_send_timeout 1h;
        }

        location /ai/ {
            set $upstream_ai ai:8002;
            proxy_pass http://$upstream_ai;
        }

        location / {
            set $upstream_frontend host.docker.internal:5173;
            proxy_pass http://$upstream_frontend;
        }
    }
}
