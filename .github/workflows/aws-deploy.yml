name: Deploy to AWS EKS

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: clashcode
  EKS_CLUSTER_NAME: clashcode-eks

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, Tag, and Push Images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          # Build and push images
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:core-${{ github.sha }} ./services/core
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:core-${{ github.sha }}
          
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:chat-${{ github.sha }} ./services/chat
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:chat-${{ github.sha }}
          
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:ai-${{ github.sha }} ./services/ai
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:ai-${{ github.sha }}

      - name: Update Kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Deploy to EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          # Update the images in kustomization.yaml to the new SHA-tagged versions
          cd infra/k8s/overlays/dev
          kustomize edit set image core=$ECR_REGISTRY/$ECR_REPOSITORY:core-${{ github.sha }}
          kustomize edit set image chat=$ECR_REGISTRY/$ECR_REPOSITORY:chat-${{ github.sha }}
          kustomize edit set image ai=$ECR_REGISTRY/$ECR_REPOSITORY:ai-${{ github.sha }}
          
          # Apply the manifests
          kustomize build . | kubectl apply -f -
